<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
}

.navbar { background: #020617; }

.table {
    color: white;
}

.table th {
    background: #1e293b;
    color: #38bdf8;
}

.table td {
    background: #0f172a;
    vertical-align: middle;
}

.empty-cart {
    text-align: center;
    padding: 80px;
    color: #94a3b8;
}

.total-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: right;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
    <a class="navbar-brand text-info fw-bold">Ekart</a>
    <div class="ms-auto">
        <a th:href="@{'/main/' + ${userId}}" class="btn btn-outline-light me-2">Home</a>
        <a th:href="@{'/cart/' + ${userId}}" class="btn btn-warning me-2">Cart 🛒</a>
        <a th:href="@{'/orders/' + ${userId}}" class="btn btn-outline-success me-2">My Orders</a>
        <a th:href="@{/loginPage}" class="btn btn-outline-danger">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">🛒 Your Cart</h2>

<!-- Empty cart message -->
<div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart">
    <h4>Your cart is empty!</h4>
    <p>Browse products and add items to your cart.</p>
    <a th:href="@{'/main/' + ${userId}}" class="btn btn-info mt-3">Browse Products</a>
</div>

<!-- Cart table -->
<div th:if="${!#lists.isEmpty(cartItems)}">
<table class="table table-bordered">
    <thead>
    <tr>
        <th>#</th>
        <th>Product Name</th>
        <th>Price (₹)</th>
        <th>Quantity</th>
        <th>Subtotal (₹)</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c, status : ${cartItems}">
        <td th:text="${status.count}">1</td>
        <td th:text="${cartProducts[status.index].prodName}">Product</td>
        <td th:text="${cartProducts[status.index].prodPrice}">0</td>
        <td th:text="${c.quantity}">1</td>
        <td th:text="${cartProducts[status.index].prodPrice * c.quantity}">0</td>
        <td>
            <a th:href="@{'/removeCart/' + ${userId} + '/' + ${c.id}}"
               class="btn btn-danger btn-sm">❌ Remove</a>
        </td>
    </tr>
    </tbody>
</table>

<!-- Total and Place Order -->
<div class="total-box">
    <h4>Total Amount: ₹ <span th:text="${totalAmount}">0</span></h4>
    <a th:href="@{'/placeOrder/' + ${userId}}"
       class="btn btn-success btn-lg mt-2">✅ Place Order</a>
</div>
</div>

</div>

</body>
</html>
