<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: Arial, sans-serif;
}

.card {
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    color: white;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<div th:if="${Success}">
    <p style="color: lightgreen;" th:text="${Success}"></p>
</div>

<div th:if="${errorMsg}">
    <p style="color: red;" th:text="${errorMsg}"></p>
</div>

<form th:action="@{/login}" th:object="${user}" method="post">
    <input type="text" placeholder="Email" th:field="*{email}"/>
    <input type="password" placeholder="Password" th:field="*{password}"/>

    <button type="submit">Login</button>
</form>

<a th:href="@{/regPage}">Create new Account? SignUp</a>


</div>

</body>
</html>
