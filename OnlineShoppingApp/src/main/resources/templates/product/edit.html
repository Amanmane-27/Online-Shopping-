<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Product</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    font-family: Arial, sans-serif;
}

.card {
    width:400px;
    padding:30px;
    border-radius:15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    color:white;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button {
    width:100%;
    padding:10px;
    background:#f59e0b;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#d97706;
}

a {
    display:block;
    margin-top:10px;
    color:#93c5fd;
}
</style>

</head>

<body>

<div class="card">

<h2>✏️ Edit Product</h2>

<form th:action="@{'/updateProduct/' + ${userId}}" method="post" th:object="${product}">
    <!-- Hidden field for product ID so JPA updates instead of creating new -->
    <input type="hidden" th:field="*{prodId}"/>

    <input type="text" th:field="*{prodName}" placeholder="Product Name" required/>
    <input type="text" th:field="*{prodType}" placeholder="Category"/>
    <input type="text" th:field="*{prodInfo}" placeholder="Description"/>
    <input type="number" th:field="*{prodPrice}" placeholder="Price" step="0.01" required/>
    <input type="number" th:field="*{prodQuantity}" placeholder="Quantity" required/>
    <input type="text" th:field="*{imageUrl}" placeholder="Image URL (optional)"/>

    <button type="submit">Update Product</button>
</form>

<a th:href="@{'/products/' + ${userId}}">⬅ Back to Products</a>

</div>

</body>
</html>
