<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Products</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.card {
    width:250px;
    background:#020617;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

button {
    background:red;
    border:none;
    padding:5px 10px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1 style="text-align:center;">Products</h1>

<div class="container">

<div class="card" th:each="p : ${products}">
    <h3 th:text="${p.prodName}"></h3>
    <p th:text="${p.prodType}"></p>
    <p th:text="${p.prodInfo}"></p>
    <p>₹ <span th:text="${p.prodPrice}"></span></p>
    <p>Stock: <span th:text="${p.prodQuantity}"></span></p>

    <a th:href="@{'/deleteProduct/' + ${p.prodId}}">
        <button>Delete</button>
    </a>
</div>

</div>

<a href="/addProduct" style="margin:20px; display:block; color:lightblue;">Add New Product</a>

</body>
</html>
