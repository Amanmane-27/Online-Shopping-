<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Orders</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
}

.navbar { background: #020617; }

.table { color: white; }

.table th {
    background: #1e293b;
    color: #38bdf8;
}

.table td {
    background: rgb(255, 255, 255);
    vertical-align: middle;
}

.no-orders {
    text-align: center;
    padding: 60px;
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
    <a class="navbar-brand text-info fw-bold">Ekart</a>
    <div class="ms-auto">
        <a th:href="@{'/main/' + ${userId}}" class="btn btn-outline-light me-2">Home</a>
        <a th:href="@{'/cart/' + ${userId}}" class="btn btn-warning me-2">Cart 🛒</a>
        <a th:href="@{'/orders/' + ${userId}}" class="btn btn-outline-success me-2">My Orders</a>
        <a th:href="@{/loginPage}" class="btn btn-outline-danger">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">📦 My Orders</h2>

<!-- No orders message -->
<div th:if="${#lists.isEmpty(orders)}" class="no-orders">
    <h4>You haven't placed any orders yet!</h4>
    <p>Go to the Home page and start shopping.</p>
    <a th:href="@{'/main/' + ${userId}}" class="btn btn-info mt-3">Browse Products</a>
</div>

<!-- Orders table -->
<div th:if="${!#lists.isEmpty(orders)}">
<table class="table table-bordered">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Status</th>
        <th>Total Amount (₹)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orders}">
        <td th:text="${o.id}">1</td>
        <td th:text="${#temporals.format(o.orderDate, 'dd-MM-yyyy HH:mm')}">Date</td>
        <td>
            <span class="badge bg-success" th:text="${o.status}">Status</span>
        </td>
        <td th:text="${o.totalAmount}">0</td>
    </tr>
    </tbody>
</table>
</div>

</div>

</body>
</html>
